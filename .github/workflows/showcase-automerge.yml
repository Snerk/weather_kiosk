name: Showcase auto-merge
# Residents can publish to the kiosk without approval, but ONLY inside
# content/residents/. Anything else in the PR blocks the auto-merge and waits
# for Snerk. Rendering is additionally sandboxed on the kiosk itself.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths: ["content/residents/**"]

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Validate the contribution
        run: |
          set -euo pipefail
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          git fetch origin $BASE
          FILES=$(git diff --name-only $BASE $HEAD)
          echo "$FILES"

          # 1. every changed file must live under content/residents/
          echo "$FILES" | grep -qv '^content/residents/' \
            && { echo "::error::PR touches files outside content/residents/ — needs human review"; exit 1; } || true

          # 2. allowed extensions only
          echo "$FILES" | grep -Eqv '\.(html|css|md|json|png|jpg|jpeg|gif|svg|webp)$' \
            && { echo "::error::disallowed file type"; exit 1; } || true

          # 3. size caps: 2 MB per file, 10 MB per PR
          TOTAL=0
          while read -r f; do
            [ -f "$f" ] || continue
            SZ=$(stat -c%s "$f")
            [ "$SZ" -gt 2097152 ] && { echo "::error::$f > 2MB"; exit 1; }
            TOTAL=$((TOTAL+SZ))
          done <<< "$FILES"
          [ "$TOTAL" -gt 10485760 ] && { echo "::error::PR > 10MB total"; exit 1; }

          # 4. no path tricks
          echo "$FILES" | grep -q '\.\.' && { echo "::error::path traversal"; exit 1; } || true

          # 5. scripts don't run in the kiosk's sandboxed iframe, but reject
          #    them anyway to keep the repo clean
          for f in $(echo "$FILES" | grep -E '\.(html|svg)$'); do
            [ -f "$f" ] || continue
            grep -iqE '<script|javascript:|onerror=|onload=' "$f" \
              && { echo "::error::$f contains script content"; exit 1; }
          done
          echo "validation passed"

      - name: Merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --repo ${{ github.repository }}
